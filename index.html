<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="ico.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/processing.css">
    <link rel="stylesheet" href="css/result.css">
    <link rel="stylesheet" href="css/neu.css">
    <link rel="stylesheet" href="css/history.css">

</head>
<body>
    <div class="app-container">

        <div class="page" id="homePage">
            <div class="home">
                <div class="home-header">
                    <button class="icon-btn" id="historyBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
                            <polyline points="12 7 12 12 15 14"/>
                        </svg>
                    </button>
                    <h1 class="home-title">Wallpaper AI</h1>
                    <button class="icon-btn" id="settingsBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                </div>
                <div class="home-body">
                    <div class="section-label">Theme</div>
                    <div class="carousel-row" id="subjectCarousel"></div>
                    <div class="plus-divider">+</div>
                    <div class="carousel-row" id="styleCarousel"></div>
                    <div class="section-label">Style</div>
                    <input class="touch-input" id="touchInput" type="text" placeholder="add your own touch" />
                    <button class="btn btn-generate" id="generateBtn">Generate</button>
                    <button class="btn btn-surprise" id="surpriseBtn"><i>Surprise me</i></button>
                </div>
            </div>
        </div>

        <div class="page hidden" id="processingPage">
            <div class="processing">
                <div class="processing-header">
                    <button class="icon-btn" id="backBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <h2 class="processing-title">Generating</h2>
                    <div style="width:36px"></div>
                </div>
                <div class="processing-body">
                    <div class="processing-animation">
                        <div class="orbit-ring">
                            <div class="orbit-dot"></div>
                        </div>
                        <div class="orbit-ring ring2">
                            <div class="orbit-dot"></div>
                        </div>
                        <div class="orbit-ring ring3">
                            <div class="orbit-dot"></div>
                        </div>
                        <div class="processing-center-text">
                            <span id="processingSubLabel"></span>
                        </div>
                    </div>
                    <p class="processing-hint">Crafting your wallpaper...</p>
                </div>
            </div>
        </div>

        <div class="page hidden" id="resultPage">
            <div class="result">
                <div class="result-header">
                    <button class="icon-btn" id="resultBackBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <div class="result-title-block">
                        <h2 class="result-title" id="resultTitle">Result</h2>
                        <p class="result-subtitle" id="resultSubtitle"></p>
                    </div>
                    <div style="width:36px"></div>
                </div>

                <div class="result-carousel-wrap">
                    <div class="result-carousel" id="resultCarousel"></div>
                    <div class="result-dots" id="resultDots"></div>
                </div>

                <div class="result-actions">
                    <button class="btn btn-generate" id="downloadBtn">Download</button>
                    <button class="btn btn-surprise" id="recreateBtn"><i>Recreate</i></button>
                </div>
            </div>
        </div>

        <div class="page hidden" id="historyPage">
            <div class="history">
                <div class="history-header">
                    <button class="icon-btn" id="historyBackBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <h2 class="history-title">History</h2>
                    <button class="history-clear-btn" id="historyClearBtn">Clear all</button>
                </div>

                <div class="history-grid" id="historyGrid"></div>

                <div class="history-viewer hidden" id="historyViewer">
                    <div class="history-viewer-header">
                        <button class="icon-btn" id="historyViewerBackBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"/>
                            </svg>
                        </button>
                        <div>
                            <p class="history-viewer-title" id="historyViewerTitle"></p>
                            <p class="history-viewer-subtitle" id="historyViewerSubtitle"></p>
                        </div>
                        <div style="width:36px"></div>
                    </div>
                    <div class="history-viewer-img" id="historyViewerImg"></div>
                    <div class="history-viewer-actions">
                        <button class="btn btn-generate" id="historyDownloadBtn">Download</button>
                        <button class="btn btn-surprise btn-danger" id="historyRemoveBtn"><i>Remove</i></button>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/history.js"></script>

</body>
</html>
